server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Compression gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;

    # Cache long terme pour les assets versionnés (hash dans le nom de fichier)
    location ~* /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache court pour index.html (toujours frais)
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA : toutes les routes → index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
